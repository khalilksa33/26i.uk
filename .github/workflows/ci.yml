name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint and Type Check
      run: npm run lint

    - name: Build Project
      run: npm run build
      env:
        VITE_ERP_URL: ${{ secrets.ERP_URL }}

    # Note: For local server deployment, you can add a step here to 
    # trigger a webhook on your local server or use SSH to pull changes.
